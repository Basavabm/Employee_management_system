version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ems-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ems
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ems-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./ems-backend
      dockerfile: Dockerfile
    image: basavabm/ems-backend:v1
    container_name: ems-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ems?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
    ports:
      - "8081:8081"
    restart: always
    networks:
      - ems-network

  frontend:
    build:
      context: ./ems-frontend
      dockerfile: Dockerfile
    image: basavabm/ems-frontend:v1
    container_name: ems-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    restart: always
    networks:
      - ems-network

volumes:
  mysql_data:

networks:
  ems-network:
    driver: bridge
